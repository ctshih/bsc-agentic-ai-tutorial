<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>隨堂測驗｜EP02 反覆迭代把知識庫養大養好</title>
<style>
  :root{
    --ink:#1b2733; --soft:#5a6b7b; --faint:#8b98a5;
    --bg:#f7f8fa; --surface:#ffffff; --border:#e4e8ee;
    --accent:#2563eb; --accent-soft:#eff4ff;
    --green:#16a34a; --green-soft:#e9f7ef; --red:#dc2626; --red-soft:#fdecec;
    --radius:12px; --maxw:820px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);line-height:1.7;font-size:16.5px;
    font-family:-apple-system,"Segoe UI","Noto Sans TC","Microsoft JhengHei","PingFang TC",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px 90px}
  header.hero{max-width:var(--maxw);margin:0 auto;padding:46px 22px 8px}
  .topbar{height:12px;background:var(--accent);position:fixed;top:0;left:0;right:0;z-index:10}
  .eyebrow{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.08em;margin:0 0 8px}
  h1{font-size:30px;margin:0 0 8px;line-height:1.3}
  .sub{color:var(--soft);margin:0 0 4px}
  .meta{color:var(--faint);font-size:13.5px}
  a.back{color:var(--accent);text-decoration:none;font-size:14px}
  a.back:hover{text-decoration:underline}

  /* 結果橫幅 */
  #result{display:none;margin:22px 0 8px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:24px 26px;text-align:center;box-shadow:0 6px 24px rgba(16,24,40,.08)}
  #result.show{display:block}
  #result .score{font-size:46px;font-weight:800;color:var(--accent);line-height:1.1}
  #result .score small{font-size:24px;color:var(--faint);font-weight:600}
  #result .rmsg{font-size:18px;margin:6px 0 16px}
  #result button{font:inherit;font-size:15px;padding:9px 22px;border-radius:10px;border:1px solid var(--accent);
    background:var(--accent);color:#fff;cursor:pointer}
  #result button:hover{background:#1d50c9}

  .progress{position:sticky;top:12px;z-index:5;background:color-mix(in srgb,var(--bg) 85%,transparent);
    backdrop-filter:blur(6px);padding:10px 0;font-size:14px;color:var(--soft)}
  .progress b{color:var(--accent)}

  .qcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    padding:20px 22px;margin:16px 0;box-shadow:0 1px 3px rgba(16,24,40,.05);transition:box-shadow .2s}
  .qcard.flash{box-shadow:0 0 0 3px rgba(220,38,38,.35)}
  .qhead{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
  .qnum{flex:none;width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;
    font-weight:700;text-align:center;line-height:30px;font-size:15px}
  .qtext{font-size:17px;font-weight:500;padding-top:2px}
  .opts{display:grid;gap:9px;padding-left:42px}
  .opt{display:flex;gap:11px;align-items:flex-start;padding:11px 14px;border:1px solid var(--border);
    border-radius:10px;cursor:pointer;transition:border-color .15s,background .15s}
  .opt:hover{border-color:var(--accent);background:var(--accent-soft)}
  .opt input{position:absolute;opacity:0;width:0;height:0}
  .opt .mark{flex:none;width:20px;height:20px;border:2px solid #c3ccd6;border-radius:50%;margin-top:2px;
    position:relative;transition:border-color .15s}
  .opt input:checked ~ .mark{border-color:var(--accent)}
  .opt input:checked ~ .mark::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent)}
  .opt .otext{font-size:15.5px}
  .opt.correct{border-color:var(--green);background:var(--green-soft)}
  .opt.correct .mark{border-color:var(--green)}
  .opt.correct .mark::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--green)}
  .opt.wrong{border-color:var(--red);background:var(--red-soft)}
  .opt.wrong .mark{border-color:var(--red)}
  .opt.wrong .mark::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--red)}
  .graded .opt{cursor:default}
  .graded .opt:hover{background:inherit;border-color:var(--border)}
  .graded .opt.correct:hover{border-color:var(--green)}
  .graded .opt.wrong:hover{border-color:var(--red)}
  .explain{margin:12px 0 0 42px;padding:11px 14px;background:var(--accent-soft);border-left:3px solid var(--accent);
    border-radius:0 8px 8px 0;font-size:14.5px;color:var(--ink)}

  .actions{margin:26px 0 0;text-align:center}
  .name-input{display:block;margin:0 auto 14px;width:300px;max-width:90%;font:inherit;font-size:15px;padding:11px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--ink)}
  .name-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
  #submit{font:inherit;font-size:17px;font-weight:600;padding:13px 40px;border-radius:12px;border:none;
    background:var(--accent);color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,.3)}
  #submit:hover{background:#1d50c9}
  .foot{max-width:var(--maxw);margin:0 auto;padding:24px 22px;color:var(--faint);font-size:12.5px;border-top:1px solid var(--border)}
  @media(max-width:560px){.opts,.explain{padding-left:0;margin-left:0}}
</style>
</head>
<body>
<div class="topbar"></div>

<header class="hero">
  <p class="eyebrow">隨堂測驗 · EP02 · 10 題單選</p>
  <h1>迭代心法，你掌握了多少？</h1>
  <p class="sub">這份測驗對應教學文件〈用 Agentic AI 反覆迭代、把知識庫養大養好〉。</p>
  <p class="meta">答完點「交卷看分數」當場計分並顯示解析。純前端、不會送出任何資料。　<a class="back" href="index.html">← 回教學文件</a></p>
</header>

<div class="wrap">
  <div id="result"></div>
  <div class="progress">已作答 <b id="answered">0</b> / 10 題</div>
  <div id="quiz-list"></div>
  <div class="actions">
    <input id="name" class="name-input" type="text" placeholder="姓名（選填，老師統計用）" maxlength="20" autocomplete="off">
    <button id="submit">交卷看分數</button>
  </div>
</div>

<div class="foot">BSC with Agentic AI Tutorial · EP02 隨堂測驗（純前端 HTML，可離線使用）</div>

<script>
// ↓↓↓ 部署「Google 試算表記分」用：把你的 Google Apps Script 網址貼進引號內。
//     留空＝只在本機計分、不送出任何資料（一樣可正常使用）。
const SCRIPT_URL = '';

const QUIZ = [
  {q:"EP02 跟 EP01 最大的不同是什麼？",
   options:["EP01 從零建立雛形，EP02 是反覆迭代、把它養大養好","EP02 完全重做、丟掉 EP01 的成果","EP02 改用別的程式語言重寫","兩集內容其實完全一樣"],
   answer:0, explain:"真實研究幾乎不會一次到位；EP02 教的就是「怎麼把已經做好的東西越改越好」。"},

  {q:"使用者要 AI 把每篇論文寫出「科普版／學術版」時，連用三個驚嘆號強調的關鍵要求是？",
   options:["字數一定要剛好兩千字","一定要用英文寫","要回頭把原始論文「再仔細讀一次」，不能拿現有文字隨便擴寫","越快越好，不必管正確性"],
   answer:2, explain:"只叫 AI「擴寫」會用既有文字膨脹、沒有新資訊；要它回原文再讀，才挖得出真正的方法細節與正確數字。"},

  {q:"使用者說「段落間距要加大」，AI 第一次改完卻沒生效，真正的原因是？",
   options:["瀏覽器壞了","它寫的樣式「優先序」太低、被一條更強的舊規則蓋掉，段落其實一直是零間距","使用者忘了存檔","字太多放不下"],
   answer:1, explain:"AI 跟人一樣會犯錯——靠「驗證」（實際打開來量）才發現根本沒生效。「說完成」不等於「真的對」。"},

  {q:"把方程式改成 LaTeX 渲染時，AI 額外揪出的隱藏 bug 是？",
   options:["圖片載不出來","不等式的「裸」小於、大於符號會被瀏覽器當成 HTML 標籤、把後面內容吃掉","字型太小","顏色不對"],
   answer:1, explain:"內文的小於、大於要逸出成安全寫法；這個 bug 連上一集就寫好的舊頁面也一起修到了。"},

  {q:"使用者丟進 5 篇新論文後，AI 為什麼「停下來」跳出決策選單？",
   options:["它不會讀 PDF","檔案太大讀不動","其中 4 篇是通用／哺乳類的方法論文，收了會把範圍從「果蠅」擴大，方向該由人決定","只是想拖延時間"],
   answer:2, explain:"要不要擴大知識庫的範圍，是方向問題、是「你的事」——AI 攤開選項讓你決定，而不是自作主張。"},

  {q:"先把 4 位團隊成員加進名單時「圖上沒有任何變化」，這個鋪路後來怎麼兌現？",
   options:["一直都沒有用到","收了外部論文後，團隊論文有橘色外框、外部論文沒框，一眼就分得出來","變成隨機顏色","把外部論文刪掉"],
   answer:1, explain:"有些設定是為了未來——等收錄了外部論文，「加框」才看得出團隊內外的差異。"},

  {q:"使用者問「丟新 PDF 你會做哪些處理」、看完流程只回「要」，AI 接著做了什麼？",
   options:["把這套收錄流程正式寫進規則書 CLAUDE.md，未來每次自動照辦","什麼都沒做","把流程刪掉","改用別的工具"],
   answer:0, explain:"「規則書跟著一起更新」——把確認過的好流程固定下來，知識庫長大才不會走樣。"},

  {q:"重寫 6 篇舊論文、精讀 5 篇新論文、再寫 3 篇概念條目，AI 都用同一招完成，是？",
   options:["自己一篇一篇慢慢讀","派 Subagent，一篇一個分身平行處理，主線保持乾淨又加速","請使用者幫忙讀","直接跳過不讀"],
   answer:1, explain:"會塞爆對話的研究與精讀，交給分身平行做，是整個專案反覆用到的關鍵手法。"},

  {q:"關鍵字越來越多（共 31 個）之後，使用者要求怎麼處理？",
   options:["刪掉一半","全部改成同一個顏色","把它們分成幾類，在網路圖上用不同（飽和、不過淺）的顏色標記、並加圖例","乾脆不要顯示關鍵字"],
   answer:2, explain:"分類上色是「給人看的鷹架」；相關的關鍵字本來就會聚成一團，上色後更一目了然。"},

  {q:"如果只用一句話總結 EP02 的精神，最貼切的是？",
   options:["第一次就要做到完美，否則就整個重來","把所有決定都丟給 AI、自己不用判斷","越少跟 AI 互動越好","迭代是常態；「再讀」勝過「擴寫」、「驗證」勝過「相信」，方向你決定、後勤交給它"],
   answer:3, explain:"把東西「養大養好」比從零做出來更需要你的判斷——你出題、決策、糾錯，AI 包辦其餘的一切。"},
];

const list = document.getElementById('quiz-list');
QUIZ.forEach((item, qi) => {
  const card = document.createElement('div');
  card.className = 'qcard'; card.id = 'q' + qi;
  const opts = item.options.map((opt, oi) =>
    `<label class="opt"><input type="radio" name="q${qi}" value="${oi}"><span class="mark"></span><span class="otext">${opt}</span></label>`
  ).join('');
  card.innerHTML =
    `<div class="qhead"><span class="qnum">${qi+1}</span><span class="qtext">${item.q}</span></div>` +
    `<div class="opts">${opts}</div><div class="explain" hidden></div>`;
  list.appendChild(card);
});

const answeredEl = document.getElementById('answered');
document.addEventListener('change', e => {
  if (e.target.matches('input[type=radio]')) {
    const n = new Set([...document.querySelectorAll('input[type=radio]:checked')].map(i=>i.name)).size;
    answeredEl.textContent = n;
  }
});

document.getElementById('submit').addEventListener('click', grade);

function grade(){
  const unanswered = [];
  QUIZ.forEach((_, qi) => { if (!document.querySelector(`input[name="q${qi}"]:checked`)) unanswered.push(qi); });
  if (unanswered.length){
    alert(`還有 ${unanswered.length} 題沒作答喔！`);
    const first = document.getElementById('q' + unanswered[0]);
    first.scrollIntoView({behavior:'smooth', block:'center'});
    first.classList.add('flash'); setTimeout(()=>first.classList.remove('flash'), 1500);
    return;
  }
  let score = 0;
  const marks = [];
  QUIZ.forEach((item, qi) => {
    const chosen = +document.querySelector(`input[name="q${qi}"]:checked`).value;
    const card = document.getElementById('q' + qi);
    card.classList.add('graded');
    card.querySelectorAll('.opt').forEach((lab, oi) => {
      lab.querySelector('input').disabled = true;
      if (oi === item.answer) lab.classList.add('correct');
      if (oi === chosen && chosen !== item.answer) lab.classList.add('wrong');
    });
    const ex = card.querySelector('.explain');
    ex.innerHTML = (chosen === item.answer ? '✅ <b>答對！</b> ' : '❌ <b>答錯。</b> ') + item.explain;
    ex.hidden = false;
    const ok = chosen === item.answer;
    marks.push(ok ? 1 : 0);
    if (ok) score++;
  });
  showResult(score);
  document.getElementById('submit').style.display = 'none';
  logResult(score, marks);
}

// 把成績送到 Google 試算表（透過 Apps Script）。SCRIPT_URL 留空時不做事。
function logResult(score, marks){
  if (!SCRIPT_URL) return;
  try {
    fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify({
        name: (document.getElementById('name').value || '').trim(),
        score: score, total: QUIZ.length, marks: marks, ts: new Date().toISOString()
      })
    });
  } catch (e) { /* 靜默失敗，不影響本機計分 */ }
}

function showResult(score){
  let msg;
  if (score === 10) msg = '滿分！🎉 你完全掌握了迭代心法。';
  else if (score >= 8) msg = '很好，觀念很清楚！';
  else if (score >= 6) msg = '不錯，再複習幾個重點就更穩了。';
  else if (score >= 4) msg = '及格邊緣，建議重看一遍教學。';
  else msg = '別灰心，回去再看一次教學吧！';
  const r = document.getElementById('result');
  r.innerHTML =
    `<div class="score">${score} <small>/ 10</small></div>` +
    `<div class="rmsg">${msg}</div>` +
    `<button id="retry">重新作答</button>`;
  r.classList.add('show');
  document.getElementById('retry').addEventListener('click', () => location.reload());
  r.scrollIntoView({behavior:'smooth', block:'center'});
}
</script>
</body>
</html>
